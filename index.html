<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bản Đồ Khảo Sát Cáp Quang – KV5 An Giang</title>
  <meta name="description" content="Bản đồ khảo sát hạ tầng cáp quang GPON 2026 tại các khu vực An Châu, An Phú, Châu Đốc, Châu Phú, Phú Tân, Tân Châu thuộc tỉnh An Giang." />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- No clustering – markers are fixed -->
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-dark:     #0d1117;
      --bg-panel:    #161b22;
      --bg-card:     #21262d;
      --border:      #30363d;
      --text-main:   #e6edf3;
      --text-muted:  #8b949e;
      --accent:      #58a6ff;
      --radius:      10px;

      /* Sheet colors – distinct flag colors */
      --c-acu:  #e63946;   /* AN CHÂU   – red   */
      --c-apu:  #2196f3;   /* AN PHÚ    – blue  */
      --c-cdc:  #ff9800;   /* CHÂU ĐỐC  – orange*/
      --c-cpu:  #4caf50;   /* CHÂU PHÚ  – green */
      --c-ptn:  #9c27b0;   /* PHÚ TÂN   – purple*/
      --c-tcu:  #ffeb3b;   /* TÂN CHÂU  – yellow*/
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── TOP BAR ── */
    #topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 20px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      flex-shrink: 0;
    }
    #topbar .logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--accent);
      white-space: nowrap;
    }
    #topbar .subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }
    #topbar .spacer { flex: 1; }

    /* stats badges */
    .stat-badge {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 6px 14px;
      min-width: 80px;
    }
    .stat-badge .val {
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }
    .stat-badge .lbl {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* ── BODY ── */
    #content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 300px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
      transition: width 0.3s;
    }
    #sidebar.collapsed { width: 0; overflow: hidden; }

    #sidebar-header {
      padding: 14px 16px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* search */
    #search-wrap {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #search-input {
      width: 100%;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 12px;
      color: var(--text-main);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search-input:focus { border-color: var(--accent); }
    #search-input::placeholder { color: var(--text-muted); }

    /* ── LAYER ACCORDION ── */
    #layers {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 12px;
    }
    #layers::-webkit-scrollbar { width: 4px; }
    #layers::-webkit-scrollbar-track { background: transparent; }
    #layers::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* KV region group header (KV5 / KV6) */
    .kv-group-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 6px;
      margin-top: 6px;
      border-top: 1px solid var(--border);
    }
    .kv-group-header:first-child { border-top: none; margin-top: 0; }
    .kv-badge {
      font-size: 10px;
      font-weight: 800;
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .kv-title {
      font-size: 11px;
      color: var(--text-muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* District header row */
    .district-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      cursor: pointer;
      border-radius: 7px;
      margin: 2px 8px;
      transition: background 0.15s;
      user-select: none;
    }
    .district-header:hover { background: var(--bg-card); }

    .layer-checkbox {
      width: 15px;
      height: 15px;
      border-radius: 4px;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s;
    }
    .layer-checkbox.checked::after {
      content: '✓';
      font-size: 10px;
      color: #fff;
      font-weight: 700;
    }

    .layer-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .district-label { flex: 1; }
    .district-name  { font-size: 13px; font-weight: 600; }
    .district-count { font-size: 11px; color: var(--text-muted); }

    .expand-arrow {
      font-size: 11px;
      color: var(--text-muted);
      transition: transform 0.25s;
      flex-shrink: 0;
    }
    .expand-arrow.open { transform: rotate(90deg); }

    /* Sub-list container */
    .district-body {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    .district-body.open { max-height: 2000px; }

    /* Individual location row */
    .loc-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 14px 6px 38px;
      cursor: pointer;
      border-radius: 6px;
      margin: 1px 8px;
      transition: background 0.12s;
    }
    .loc-item:hover { background: var(--bg-card); }

    .loc-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 5px;
      flex-shrink: 0;
    }

    .loc-info { flex: 1; min-width: 0; }
    .loc-name {
      font-size: 12px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loc-sub {
      font-size: 10.5px;
      color: var(--text-muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .loc-ab {
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 10px;
      color: #fff;
      flex-shrink: 0;
      margin-top: 3px;
    }


    /* ── MAP ── */
    #map {
      flex: 1;
      background: #1a1a2e;
    }

    /* ── TOGGLE SIDEBAR BUTTON ── */
    #toggle-sidebar {
      position: absolute;
      left: 300px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1001;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 6px 6px 0;
      width: 20px;
      height: 48px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      font-size: 12px;
      transition: left 0.3s, color 0.2s;
    }
    #toggle-sidebar:hover { color: var(--text-main); }

    /* ── POPUP CUSTOM ── */
    .leaflet-popup-content-wrapper {
      background: var(--bg-card) !important;
      color: var(--text-main) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
      padding: 0 !important;
    }
    .leaflet-popup-tip { background: var(--bg-card) !important; }
    .leaflet-popup-content { margin: 0 !important; width: 280px !important; }

    .popup-header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .popup-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 20px;
      color: #fff;
    }
    .popup-title { font-size: 13px; font-weight: 600; line-height: 1.3; }

    .popup-body { padding: 10px 14px 12px; }
    .popup-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 12px;
      margin-bottom: 5px;
      gap: 8px;
    }
    .popup-row .pk { color: var(--text-muted); flex-shrink: 0; }
    .popup-row .pv { color: var(--text-main); text-align: right; }

    .popup-coords {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .coord-box {
      background: rgba(88,166,255,0.08);
      border: 1px solid rgba(88,166,255,0.2);
      border-radius: 6px;
      padding: 5px 8px;
      font-size: 11px;
    }
    .coord-box .cl { color: var(--accent); font-weight: 600; margin-bottom: 2px; }
    .coord-box .cv { color: var(--text-muted); font-family: monospace; }

    /* fly-to partner button in popup */
    .fly-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1.5px solid;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      width: 100%;
      box-sizing: border-box;
      transition: filter 0.2s, background 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .fly-btn:hover {
      filter: brightness(1.25);
      background: rgba(255,255,255,0.07);
    }

    /* line drawn on map – popup for line */
    .line-popup .popup-content { padding: 8px 12px; font-size: 12px; }

    /* ── LOADING ── */
    #loading {
      position: absolute;
      inset: 0;
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      gap: 16px;
    }
    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-muted); }

    /* ── BOTTOM STATUS ── */
    #status-bar {
      padding: 5px 16px;
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      gap: 16px;
      flex-shrink: 0;
    }

    /* Legend */
    .map-legend {
      position: absolute;
      bottom: 40px;
      right: 12px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 14px;
      z-index: 500;
      min-width: 160px;
    }
    .map-legend h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
      font-size: 12px;
    }
    .legend-kv {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      margin: 10px 0 4px;
      padding-bottom: 2px;
      border-bottom: 1px solid var(--border);
    }
    .legend-kv:first-of-type { margin-top: 4px; }
    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 2px solid rgba(255,255,255,0.3);
    }
    .legend-line {
      width: 24px;
      height: 3px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Basemap switcher */
    #basemap-switcher {
      position: absolute;
      top: 10px;
      right: 12px;
      z-index: 500;
      display: flex;
      gap: 4px;
    }
    .bm-btn {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .bm-btn:hover, .bm-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── RESPONSIVE MOBILE ── */
    @media (max-width: 768px) {
      #sidebar { display: none !important; }
      #toggle-sidebar { display: none !important; }
      #topbar {
        flex-direction: column;
        align-items: flex-start;
        height: auto;
        padding: 12px;
        gap: 8px;
      }
      #topbar .spacer { display: none; }
      .stat-badge {
        width: 100%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-direction: row-reverse;
      }
      .stat-badge .lbl { margin-top: 0; }
      #status-bar { left: 10px; bottom: 10px; right: 10px; justify-content: center; border-radius: 8px; }
      #basemap-switcher { flex-wrap: wrap; padding-left: 10px; }
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Đang tải dữ liệu bản đồ…</div>
</div>

<!-- Top Bar -->
<div id="topbar">
  <div>
    <div class="logo">🗺 Bản Đồ Cáp Quang GPON 2026</div>
    <div class="subtitle">KV5 + KV6 · An Giang – Khảo Sát</div>
  </div>
  <div class="spacer"></div>
  <div class="stat-badge"><span class="val" id="stat-total">–</span><span class="lbl">Tuyến</span></div>
  <div class="stat-badge"><span class="val" id="stat-sheets">11</span><span class="lbl">Khu vực</span></div>
  <div class="stat-badge"><span class="val" id="stat-km">–</span><span class="lbl">Km 6FO</span></div>
</div>

<!-- Main Content -->
<div id="content">
  <!-- Sidebar -->
  <div id="sidebar">
    <div id="sidebar-header">Lớp dữ liệu</div>
    <div id="search-wrap">
      <input id="search-input" type="text" placeholder="🔍  Tìm tuyến, OLT, điểm…" />
    </div>
    <div id="layers"></div>
  </div>

  <!-- Toggle button -->
  <div id="toggle-sidebar" title="Ẩn/hiện bảng điều khiển">‹</div>

  <!-- Map container -->
  <div id="map"></div>

  <!-- Basemap switcher -->
  <div id="basemap-switcher">
    <button class="bm-btn active" id="bm-osm" onclick="switchBasemap('osm')">OSM</button>
    <button class="bm-btn" id="bm-topo" onclick="switchBasemap('topo')">Topo</button>
    <button class="bm-btn" id="bm-sat" onclick="switchBasemap('sat')">Vệ tinh</button>
    <button class="bm-btn" id="bm-dark" onclick="switchBasemap('dark')">Tối</button>
  </div>

  <!-- Map Legend -->
  <div class="map-legend" id="map-legend"></div>
</div>

<!-- Status bar -->
<div id="status-bar">
  <span id="status-coords">Lat: – · Lng: –</span>
  <span>|</span>
  <span id="status-visible">Hiển thị: – tuyến</span>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ─────────────────────────────────────────────
//  CONFIGURATION
// ─────────────────────────────────────────────
// KV region groups – each group contains its districts
const KV_GROUPS = {
  KV5: {
    label: 'KV5 – An Châu · An Phú · Châu Đốc · Châu Phú · Phú Tân · Tân Châu',
    badgeColor: '#1d4ed8',
    sheets: [
      { key: 'KV5__ACU_OK', label: 'An Châu',   color: '#e63946' },
      { key: 'KV5__APU_OK', label: 'An Phú',    color: '#3b82f6' },
      { key: 'KV5__CĐC_OK', label: 'Châu Đốc', color: '#f97316' },
      { key: 'KV5__CPU_OK', label: 'Châu Phú',  color: '#22c55e' },
      { key: 'KV5__PTN_OK', label: 'Phú Tân',   color: '#a855f7' },
      { key: 'KV5__TCU_OK', label: 'Tân Châu',  color: '#eab308' },
    ]
  },
  KV6: {
    label: 'KV6 – Chợ Mới · Long Xuyên · Thoại Sơn · Tịnh Biên · Tri Tôn',
    badgeColor: '#065f46',
    sheets: [
      { key: 'KV6__CMI_OK', label: 'Chợ Mới',    color: '#06b6d4' },
      { key: 'KV6__LXU_OK', label: 'Long Xuyên', color: '#10b981' },
      { key: 'KV6__TSN_OK', label: 'Thoại Sơn',  color: '#f43f5e' },
      { key: 'KV6__TBN_OK', label: 'Tịnh Biên',  color: '#84cc16' },
      { key: 'KV6__TTN_OK', label: 'Tri Tôn',    color: '#fb923c' },
    ]
  },
};

// Flat lookup: sheet key → { label, color }
const SHEET_CONFIG = {};
Object.values(KV_GROUPS).forEach(grp =>
  grp.sheets.forEach(s => { SHEET_CONFIG[s.key] = { label: s.label, color: s.color }; })
);

// ─────────────────────────────────────────────
//  MAP INIT
// ─────────────────────────────────────────────
const map = L.map('map', {
  center: [10.7, 105.12],
  zoom: 11,
  zoomControl: true,
});

// Basemap tiles
const basemaps = {
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 19
  }),
  topo: L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenTopoMap', maxZoom: 17
  }),
  sat: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: '© Esri', maxZoom: 19
  }),
  dark: L.tileLayer('https://tiles.stadiamaps.com/tiles/alidade_smooth_dark/{z}/{x}/{y}{r}.png', {
    attribution: '© Stadia Maps', maxZoom: 20
  }),
};
basemaps.osm.addTo(map);
let currentBasemap = 'osm';

function switchBasemap(name) {
  map.removeLayer(basemaps[currentBasemap]);
  basemaps[name].addTo(map);
  basemaps[name].bringToBack();
  currentBasemap = name;
  document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('bm-' + name).classList.add('active');
}

// Status bar coords
map.on('mousemove', e => {
  document.getElementById('status-coords').textContent =
    `Lat: ${e.latlng.lat.toFixed(6)} · Lng: ${e.latlng.lng.toFixed(6)}`;
});

// ─────────────────────────────────────────────
//  LAYER MANAGEMENT
// ─────────────────────────────────────────────
const layerGroups  = {};   // sheet → { markers, lines }
const layerVisible = {};   // sheet → bool
let   allRows      = [];   // flat list for search

// Registry: unique key → Leaflet marker (for fly-to navigation)
const markerRegistry = {};

// Called from popup button: fly to paired marker and open its popup
function flyToMarker(key) {
  const m = markerRegistry[key];
  if (!m) return;
  map.closePopup();
  map.flyTo(m.getLatLng(), Math.max(map.getZoom(), 15), { duration: 0.8 });
  setTimeout(() => m.openPopup(), 850);
}

// Create custom flag-colored pin icon
function makeIcon(color, label) {
  const letter = label ? label[0] : '●';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <circle cx="14" cy="13" r="12" fill="${color}" stroke="white" stroke-width="2.5"/>
    <text x="14" y="17.5" text-anchor="middle" font-size="10" font-weight="700"
          font-family="Inter,sans-serif" fill="white">${letter}</text>
    <polygon points="9,24 19,24 14,34" fill="${color}" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [28, 36],
    iconAnchor: [14, 36],
    popupAnchor: [0, -36],
  });
}

function buildPopup(row, sheetName, pointLabel, partnerKey) {
  const cfg   = SHEET_CONFIG[sheetName] || {};
  const color = cfg.color || '#888';
  const label = cfg.label || sheetName;
  const fo6   = row.cap_6fo  ? Number(row.cap_6fo).toLocaleString('vi-VN')  + ' m' : '–';
  const fo12  = row.cap_12fo ? Number(row.cap_12fo).toLocaleString('vi-VN') + ' m' : '–';
  const fo24  = row.cap_24fo ? Number(row.cap_24fo).toLocaleString('vi-VN') + ' m' : '–';
  const sp    = row.sp       ? '1:' + row.sp : '–';

  // Highlight which point was clicked
  const boxA = pointLabel === 'A'
    ? `style="background:rgba(${hexToRgb(color)},0.18);border-color:${color};"` : '';
  const boxB = pointLabel === 'B'
    ? `style="background:rgba(${hexToRgb(color)},0.18);border-color:${color};"` : '';

  // Button to jump to the paired marker
  const partnerLabel  = pointLabel === 'A' ? 'B' : (pointLabel === 'B' ? 'A' : null);
  const partnerButton = (partnerKey && partnerLabel)
    ? `<button class="fly-btn" style="color:${color};border-color:${color}"
         onclick="flyToMarker('${partnerKey}')">✈ Bay đến Điểm ${partnerLabel}</button>`
    : '';

  return `
    <div class="popup-header">
      <span class="popup-badge" style="background:${color}">${label}</span>
      <div class="popup-title">${row.tuyen || 'Tuyến ' + (row.stt || '')}</div>
    </div>
    <div class="popup-body">
      <div class="popup-row"><span class="pk">STT</span><span class="pv">${row.stt ?? '–'}</span></div>
      <div class="popup-row"><span class="pk">Đơn vị</span><span class="pv">${row.don_vi || '–'}</span></div>
      <div class="popup-row"><span class="pk">OLT</span><span class="pv">${row.olt || '–'}</span></div>
      <div class="popup-row"><span class="pk">📍 Điểm A</span><span class="pv" style="color:#58a6ff">${row.diem_a || '–'}</span></div>
      <div class="popup-row"><span class="pk">📍 Điểm B</span><span class="pv" style="color:#58a6ff">${row.diem_b || '–'}</span></div>
      <div class="popup-row"><span class="pk">Cáp 6FO</span><span class="pv">${fo6}</span></div>
      <div class="popup-row"><span class="pk">Cáp 12FO</span><span class="pv">${fo12}</span></div>
      <div class="popup-row"><span class="pk">Cáp 24FO</span><span class="pv">${fo24}</span></div>
      <div class="popup-row"><span class="pk">Splitter</span><span class="pv">${sp}</span></div>
      <div class="popup-coords">
        <div class="coord-box" ${boxA}>
          <div class="cl">📌 Điểm A</div>
          <div class="cv">Lng: ${row.lon_a != null ? Number(row.lon_a).toFixed(6) : '–'}</div>
          <div class="cv">Lat: ${row.lat_a != null ? Number(row.lat_a).toFixed(6) : '–'}</div>
        </div>
        <div class="coord-box" ${boxB}>
          <div class="cl">📌 Điểm B</div>
          <div class="cv">Lng: ${row.lon_b != null ? Number(row.lon_b).toFixed(6) : '–'}</div>
          <div class="cv">Lat: ${row.lat_b != null ? Number(row.lat_b).toFixed(6) : '–'}</div>
        </div>
      </div>
      ${partnerButton}
    </div>`;
}


function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

// Validate coordinates are within realistic bounds
function isValidCoord(lat, lng) {
  return lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180 &&
         // Specifically for An Giang area (roughly 10-11.5°N, 105-106°E)
         lat > 0 && lng > 100;
}

function buildLayerForSheet(sheetName, rows) {
  const cfg = SHEET_CONFIG[sheetName] || {};
  const color = cfg.color || '#888';
  const label = cfg.label || sheetName;
  const iconA = makeIcon(color, 'A');
  const iconB = makeIcon(color, 'B');

  // Use simple layerGroups – NO clustering, markers stay fixed
  const markers = L.layerGroup();
  const lines   = L.layerGroup();

  rows.forEach((row, idx) => {
    const la  = row.lat_a, loa = row.lon_a;
    const lb  = row.lat_b, lob = row.lon_b;
    const validA = la  != null && loa != null && isValidCoord(la,  loa);
    const validB = lb  != null && lob != null && isValidCoord(lb,  lob);

    // Unique registry keys
    const keyA = `${sheetName}__${idx}__A`;
    const keyB = `${sheetName}__${idx}__B`;

    // Marker A – cố định, popup có nút bay sang B
    if (validA) {
      const mA = L.marker([la, loa], { icon: iconA, title: row.diem_a || '' })
        .bindPopup(buildPopup(row, sheetName, 'A', validB ? keyB : null), { maxWidth: 320 });
      mA.addTo(markers);
      markerRegistry[keyA] = mA;
    }

    // Marker B – cố định, popup có nút bay sang A
    if (validB) {
      const mB = L.marker([lb, lob], { icon: iconB, title: row.diem_b || '' })
        .bindPopup(buildPopup(row, sheetName, 'B', validA ? keyA : null), { maxWidth: 320 });
      mB.addTo(markers);
      markerRegistry[keyB] = mB;
    }

    // Đường nối A→B
    if (validA && validB) {
      L.polyline([[la, loa], [lb, lob]], {
        color: color,
        weight: 2,
        opacity: 0.6,
        dashArray: '5,5',
      })
        .bindPopup(buildPopup(row, sheetName, null, null), { maxWidth: 320 })
        .addTo(lines);
    }
  });

  return { markers, lines };
}

// ─────────────────────────────────────────────
//  SIDEBAR RENDERING  (accordion)
// ─────────────────────────────────────────────

// Fly to a row's A marker (or B if A invalid), open its popup
function flyToRow(sheetName, idx) {
  const keyA = `${sheetName}__${idx}__A`;
  const keyB = `${sheetName}__${idx}__B`;
  const m = markerRegistry[keyA] || markerRegistry[keyB];
  if (!m) return;
  map.closePopup();
  map.flyTo(m.getLatLng(), Math.max(map.getZoom(), 15), { duration: 0.8 });
  setTimeout(() => m.openPopup(), 860);
}

function renderSidebar(data) {
  const container = document.getElementById('layers');
  container.innerHTML = '';

  const legendEl = document.getElementById('map-legend');
  legendEl.innerHTML = '<h4>Chú Giải</h4>';

  Object.entries(KV_GROUPS).forEach(([kvKey, kvGroup]) => {
    // ── KV region header in Sidebar ──
    const kvHeader = document.createElement('div');
    kvHeader.className = 'kv-group-header';
    kvHeader.innerHTML = `
      <div class="kv-badge" style="background:${kvGroup.badgeColor}">${kvKey}</div>
      <div class="kv-title" title="${kvGroup.label}">${kvGroup.label}</div>
    `;
    container.appendChild(kvHeader);

    // ── KV region header in Legend ──
    const legKv = document.createElement('div');
    legKv.className = 'legend-kv';
    legKv.textContent = kvKey;
    legendEl.appendChild(legKv);

    // ── Districts under this KV ──
    kvGroup.sheets.forEach(cfg => {
      const sheetName = cfg.key;
      // Skip if data doesn't exist for this district
      if (!data[sheetName]) return;
      
      const rows    = data[sheetName];
      const visible = layerVisible[sheetName] !== false;
      const color   = cfg.color;

      // ── Legend entry ──
      const lr = document.createElement('div');
      lr.className = 'legend-row';
      lr.innerHTML = `<div class="legend-dot" style="background:${color}"></div>
        <div class="legend-line" style="background:${color};opacity:0.7"></div>
        <span>${cfg.label}</span>`;
      legendEl.appendChild(lr);

      // ── District wrapper ──
      const wrapper = document.createElement('div');
      wrapper.className = 'district-wrapper';

      // ── Header (checkbox + dot + label + arrow) ──
      const header = document.createElement('div');
      header.className = 'district-header';
      header.id = `district-header-${sheetName}`;
      header.innerHTML = `
        <div class="layer-checkbox ${visible ? 'checked' : ''}" id="chk-${sheetName}"
             style="border-color:${color};background:${visible ? color : 'transparent'}"></div>
        <div class="layer-dot" style="background:${color}"></div>
        <div class="district-label">
          <div class="district-name">${cfg.label}</div>
          <div class="district-count">${rows.length} tuyến</div>
        </div>
        <span class="expand-arrow" id="arrow-${sheetName}">▶</span>`;

      // Checkbox click – toggle visibility
      header.querySelector('.layer-checkbox').addEventListener('click', e => {
        e.stopPropagation();
        toggleLayer(sheetName, color);
      });

      // Header click – expand/collapse sub-list
      header.addEventListener('click', () => {
        const body  = document.getElementById(`body-${sheetName}`);
        const arrow = document.getElementById(`arrow-${sheetName}`);
        body.classList.toggle('open');
        arrow.classList.toggle('open');
      });

      wrapper.appendChild(header);

      // ── Sub-list body ──
      const body = document.createElement('div');
      body.className = 'district-body';
      body.id = `body-${sheetName}`;

      rows.forEach((row, idx) => {
        const locItem = document.createElement('div');
        locItem.className = 'loc-item';

        const title = row.tuyen || row.diem_a || `Tuyến ${row.stt || idx + 1}`;
        const sub   = row.olt ? `OLT: ${row.olt}` : (row.diem_a || '');

        locItem.innerHTML = `
          <div class="loc-dot" style="background:${color}"></div>
          <div class="loc-info">
            <div class="loc-name" title="${title}">${title}</div>
            <div class="loc-sub">${sub}</div>
          </div>
          <span class="loc-ab" style="background:${color}">A→B</span>`;

        locItem.addEventListener('click', () => flyToRow(sheetName, idx));
        body.appendChild(locItem);
      });

      wrapper.appendChild(body);
      container.appendChild(wrapper);
    });
  });
}



function toggleLayer(sheetName, color) {
  const vis = layerVisible[sheetName] !== false;
  layerVisible[sheetName] = !vis;

  const chk = document.getElementById(`chk-${sheetName}`);
  if (layerVisible[sheetName]) {
    chk.classList.add('checked');
    chk.style.background = color;
    if (layerGroups[sheetName]) {
      map.addLayer(layerGroups[sheetName].markers);
      map.addLayer(layerGroups[sheetName].lines);
    }
  } else {
    chk.classList.remove('checked');
    chk.style.background = 'transparent';
    if (layerGroups[sheetName]) {
      map.removeLayer(layerGroups[sheetName].markers);
      map.removeLayer(layerGroups[sheetName].lines);
    }
  }
  updateStatusVisible();
}

function updateStatusVisible() {
  let total = 0;
  Object.entries(layerVisible).forEach(([sh, vis]) => {
    if (vis !== false && layerGroups[sh]) {
      total += layerGroups[sh].markers.getLayers().length;
    }
  });
  document.getElementById('status-visible').textContent = `Hiển thị: ${total} điểm`;
}

// ─────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  if (!q) {
    // restore all visible
    Object.entries(layerGroups).forEach(([sh, grp]) => {
      if (layerVisible[sh] !== false) {
        if (!map.hasLayer(grp.markers)) map.addLayer(grp.markers);
        if (!map.hasLayer(grp.lines))   map.addLayer(grp.lines);
      }
    });
    return;
  }

  // Find matching rows and fly to first
  const matches = allRows.filter(r =>
    (r.tuyen || '').toLowerCase().includes(q) ||
    (r.olt || '').toLowerCase().includes(q) ||
    (r.diem_a || '').toLowerCase().includes(q) ||
    (r.diem_b || '').toLowerCase().includes(q) ||
    (r.don_vi || '').toLowerCase().includes(q)
  );

  if (matches.length > 0) {
    const first = matches[0];
    const lat = first.lat_a || first.lat_b;
    const lng = first.lon_a || first.lon_b;
    if (lat && lng) map.flyTo([lat, lng], 15, { duration: 1 });
  }
});

// ─────────────────────────────────────────────
//  STAT COUNTING
// ─────────────────────────────────────────────
function computeStats(data) {
  let total = 0, kmTotal = 0;
  Object.entries(data).forEach(([sh, rows]) => {
    if (!SHEET_CONFIG[sh]) return; // Skip "BẢNG TỔNG HỢP" or unknown sheets
    total += rows.length;
    rows.forEach(r => { if (r.cap_6fo) kmTotal += Number(r.cap_6fo); });
  });
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-km').textContent = (kmTotal / 1000).toFixed(0);
}

// ─────────────────────────────────────────────
//  SIDEBAR TOGGLE
// ─────────────────────────────────────────────
const sidebar = document.getElementById('sidebar');
const toggleBtn = document.getElementById('toggle-sidebar');
let sidebarOpen = true;

toggleBtn.addEventListener('click', () => {
  sidebarOpen = !sidebarOpen;
  sidebar.classList.toggle('collapsed', !sidebarOpen);
  toggleBtn.style.left = sidebarOpen ? '300px' : '0px';
  toggleBtn.textContent = sidebarOpen ? '‹' : '›';
});

// ─────────────────────────────────────────────
//  MAIN – LOAD DATA
// ─────────────────────────────────────────────
fetch('map_data.json')
  .then(r => r.json())
  .then(data => {
    // Flatten for search (only registered sheets)
    Object.entries(data).forEach(([sh, rows]) => {
      if (!SHEET_CONFIG[sh]) return;
      rows.forEach(r => { r._sheet = sh; allRows.push(r); });
    });

    // Build layers – marker cố định, không gom cụm
    Object.entries(SHEET_CONFIG).forEach(([sheetName]) => {
      const rows = data[sheetName] || [];
      const grp = buildLayerForSheet(sheetName, rows);
      layerGroups[sheetName] = grp;
      layerVisible[sheetName] = true;
      map.addLayer(grp.markers);
      map.addLayer(grp.lines);
    });

    renderSidebar(data);
    computeStats(data);
    updateStatusVisible();

    // Auto-fit bounds
    const bounds = [];
    allRows.forEach(r => {
      if (r.lat_a && r.lon_a && isValidCoord(r.lat_a, r.lon_a)) bounds.push([r.lat_a, r.lon_a]);
      if (r.lat_b && r.lon_b && isValidCoord(r.lat_b, r.lon_b)) bounds.push([r.lat_b, r.lon_b]);
    });
    if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });

    // Hide loading
    document.getElementById('loading').style.display = 'none';
  })
  .catch(err => {
    console.error(err);
    document.querySelector('.loading-text').textContent = 'Lỗi tải dữ liệu: ' + err.message;
  });
</script>
</body>
